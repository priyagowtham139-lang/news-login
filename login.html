<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stackly Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.login-box{
width:100%;
max-width:450px;
background:#1e293b;
padding:40px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.3);
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
width:160px;
}

h1{
color:white;
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#94a3b8;
margin-bottom:30px;
}

.form-group{
margin-bottom:18px;
}

.form-group label{
display:block;
color:#e2e8f0;
margin-bottom:8px;
}

.form-group input{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid rgba(255,255,255,.1);
background:#0f172a;
color:white;
outline:none;
}

.form-group input:focus{
border-color:#38bdf8;
}

.password-wrapper{
position:relative;
}

.password-wrapper input{
padding-right:50px;
}

.toggle-password{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:#94a3b8;
font-size:18px;
}

.toggle-password:hover{
color:#38bdf8;
}

.login-btn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#38bdf8;
color:#0f172a;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.login-btn:hover{
background:#0ea5e9;
color:white;
}

.signup-link{
text-align:center;
margin-top:20px;
color:#94a3b8;
}

.signup-link a{
color:#38bdf8;
text-decoration:none;
}

.admin-info{
margin-top:15px;
text-align:center;
font-size:12px;
color:#64748b;
}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">
<img src="assets/logo.webp" alt="Stackly">
</div>

<h1>Welcome Back</h1>

<p class="subtitle">
Login to continue
</p>

<form id="loginForm">

<div class="form-group">
<label>Email Address</label>
<input type="email" id="email" required>
</div>

<div class="form-group">

<label>Password</label>

<div class="password-wrapper">

<input
type="password"
id="password"
required>

<span
class="toggle-password"
onclick="togglePassword()">

<i class="fa-solid fa-eye"></i>

</span>

</div>

</div>
<div class="forgot-password">
    <a href="#" id="forgotPasswordLink">
        Forgot Password?
    </a>
</div>

<button type="submit" class="login-btn">
Login
</button>

</form>

<div class="signup-link">
Don't have an account?
<a href="signup.html">Sign Up</a>
</div>

<div class="admin-info">
Admin Login: admin@stackly.com / admin123
</div>

</div>

<script>

function togglePassword(){

const password=
document.getElementById("password");

const icon=
document.querySelector(".toggle-password i");

if(password.type==="password"){

password.type="text";

icon.classList.remove("fa-eye");
icon.classList.add("fa-eye-slash");

}else{

password.type="password";

icon.classList.remove("fa-eye-slash");
icon.classList.add("fa-eye");
}
}

document.getElementById("loginForm")
.addEventListener("submit",function(e){

e.preventDefault();

const email=
document.getElementById("email").value;

const password=
document.getElementById("password").value;

/* Admin Login */

if(
email==="admin@stackly.com" &&
password==="admin123"
){

localStorage.setItem(
"stacklyAdmin",
"true"
);

window.location.href=
"admin-dashboard.html";

return;
}

/* User Login */

const users=
JSON.parse(
localStorage.getItem("stacklyUsers")
) || [];

const user=
users.find(
u =>
u.email===email &&
u.password===password
);

if(!user){

alert("Invalid Email or Password");
return;
}

localStorage.setItem(
"stacklyLoggedInUser",
JSON.stringify(user)
);

window.location.href=
"dashboard.html";

});

</script>

</body>
</html>
